<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.box{
width:90%;
max-width:400px;
margin:60px auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

h2{
text-align:center;
color:#0a7cff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0a7cff;
color:#fff;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#0a7cff;
}
</style>

</head>

<body>

<div class="box">

<h2>تسجيل الدخول</h2>

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

<a href="register.html">إنشاء حساب جديد</a>

<a href="index.html">العودة للرئيسية</a>

</div>

</body>
</html>
