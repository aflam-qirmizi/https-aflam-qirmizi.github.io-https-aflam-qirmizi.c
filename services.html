<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Services - Online Work Maroc</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.paypal.com/sdk/js?client-id=SB3D9XW8WQY5C&currency=USD"></script>
<style>
.service-card{border:1px solid #ddd;padding:20px;margin:20px;border-radius:8px;text-align:center;}
.prix{color:#0070ba;font-size:20px;font-weight:bold;}
</style>
</head>
<body>
<header><h1>Travail en ligne Maroc</h1>
<nav><a href="index.html">Accueil</a> <a href="services.html">Services</a></nav>
</header>

<main class="container">
<h2>Nos services</h2>

<div class="service-card">
<h3>Montage Vidéo Professionnel</h3>
<p class="prix">Prix : 25 USD</p>
<div id="bouton PayPal 1"></div>
</div>

<div class="service-card">
<h3>Conception de logo</h3>
<p class="prix">Prix : 15 USD</p>
<div id="bouton PayPal 2"></div>
</div>

<div class="service-card">
<h3>Gestion Réseaux Sociaux</h3>
<p class="prix">Prix : 50 USD / mois</p>
<div id="bouton PayPal 3"></div>
</div>

</main>

<script>
paypal.Buttons({createOrder:function(data,actions){return actions.order.create({purchase_units:[{amount:{value:'25.00'}}]})},onApprove:function(data,actions){return actions.order.capture().then(function(details){alert('Paiement réussi! Merci '+details.payer.name.given_name)})}}).render('#bouton PayPal 1');
paypal.Buttons({createOrder:function(data,actions){return actions.order.create({purchase_units:[{amount:{value:'15.00'}}]})},onApprove:function(data,actions){return actions.order.capture().then(function(details){alert('Paiement réussi! Merci '+details.payer.name.given_name)})}}).render('#bouton PayPal 2');
paypal.Buttons({createOrder:function(data,actions){return actions.order.create({purchase_units:[{amount:{value:'50.00'}}]})},onApprove:function(data,actions){return actions.order.capture().then(function(details){alert('Paiement réussi! Merci '+details.payer.name.given_name)})}}).render('#bouton PayPal 3');
</script>

<footer><p>© 2026 Travail en ligne Maroc</p></footer>
</body>
</html>
