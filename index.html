<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - اربح المال</title>
<style>
    body { font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); text-align: center; padding: 50px 20px; color: white; min-height:100vh; margin:0 }
    .box { background: white; color: black; padding: 30px; border-radius: 15px; max-width: 380px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { color: #667eea; margin-bottom: 5px }
    input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size:16px }
    button { width: 95%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight:bold }
    button:hover { background: #218838; }
    .btn-blue { background:#007bff; }
    .btn-blue:hover { background:#0056b3; }
    .btn-orange { background:#ff9800; }
    .btn-orange:hover { background:#e68900; }
    hr { margin:20px 0; border:1px solid #eee }
    .small { font-size:12px; color:#666; margin-top:15px }
</style>
</head>
<body>

<div class="box">
    <h1>مرحبا بك 💰</h1>
    <p>اربح 50 درهم على كل احالة</p>
    
    <input type="email" id="email" placeholder="الايميل">
    <input type="password" id="password" placeholder="كلمة السر">
    
    <button onclick="login()">دخول</button>
    <button onclick="register()" class="btn-blue">انشاء حساب جديد</button>
    
    <hr>
    <p style="font-weight:bold">هل انت معلن؟</p>
    <button onclick="window.location='advertiser.html'" class="btn-orange">📢 لوحة المعلنين</button>
    
    <p class="small">بالدخول انت توافق على الشروط</p>
</div>

<script>
function getRef(){
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('ref') || 'ADMIN';
}

function login(){
    let email = document.getElementById('email').value;
    if(email == ""){ alert("دخل الايميل"); return; }
    
    localStorage.setItem("user", email);
    localStorage.setItem("refBy", getRef());
    if(!localStorage.getItem("balance")) localStorage.setItem("balance", "0");
    if(!localStorage.getItem("referrals")) localStorage.setItem("referrals", "0");
    
    window.location.href = "tasks.html";
}

function register(){ 
    login(); 
}
</script>
