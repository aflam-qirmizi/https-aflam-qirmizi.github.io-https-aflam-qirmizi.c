
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<style>
    body { font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); text-align: center; padding: 50px 20px; color: white; min-height:100vh; margin:0 }
    .box { background: white; color: black; padding: 30px; border-radius: 15px; max-width: 350px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { color: #667eea; }
    input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
    button { width: 95%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    button:hover { background: #218838; }
</style>
</head>
<body>
<div class="box">
    <h1>مرحبا بك 💰</h1>
    <p>اربح 50 درهم على كل احالة</p>
    <input type="email" id="email" placeholder="الايميل">
    <input type="password" id="password" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
    <button onclick="register()" style="background:#007bff;">انشاء حساب جديد</button>
</div>
<script>
function getRef(){
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('ref') || 'ADMIN';
}
function login(){
    if(document.getElementById('email').value == ""){ alert("دخل الايميل"); return; }
    localStorage.setItem("user", document.getElementById('email').value);
    localStorage.setItem("refBy", getRef());
    if(!localStorage.getItem("balance")) localStorage.setItem("balance", "0");
    if(!localStorage.getItem("referrals")) localStorage.setItem("referrals", "0");
    window.location.href = "tasks.html";
}
function register(){ login(); }
</script>
</body>
</html>
