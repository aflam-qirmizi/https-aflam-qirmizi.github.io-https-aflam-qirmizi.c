<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المهام</title>
<style>
    body { font-family: Arial; background: #f2f2f2; text-align: center; padding: 20px; }
    .boite { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 10px auto; box-shadow: 0 0 10px #ccc; }
    #minuteur { font-size: 30px; font-weight: bold; color: red; margin: 15px 0; }
    button { background: #28a745; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 5px; width: 90%; }
    button:disabled { background: gray; cursor: not-allowed; }
    #bouton_deconnexion { background: red; }
    #copyBtn { background: #007bff; }
    input { width: 90%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; text-align: center; }
</style>
</head>
<body>

<div class="boite">
    <h2>مرحبا بك</h2>
    <p>الرصيد الحالي: <span id="equilibre">0</span> درهم</p>
    <p>عدد المحالين: <span id="referrals">0</span></p>
</div>

<div class="boite">
    <h3>🎁 مهمة الاحالة - 50 درهم</h3>
    <input type="text" id="refLink" readonly value="غادي يطلع هنا">
    <button id="copyBtn" onclick="copyLink()">نسخ الرابط</button>
</div>

<div class="boite">
    <h3>مهمة مشاهدة الفيديو - 20 درهم</h3>
    <video id="video" width="100%" controls autoplay muted>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
    <div id="minuteur">01:00:00</div>
    <button id="bouton_de_finition" onclick="finirTache()" disabled>انتظر حتى ينتهي العداد</button>
</div>

<script>
    let tempsRestant = 60 * 60; 
    let intervalMinuteur;

    function commencerMinuteur(){
        intervalMinuteur = setInterval(() => {
            tempsRestant--;
            let h = Math.floor(tempsRestant / 3600);
            let m = Math.floor((tempsRestant % 3600) / 60);
            let s = tempsRestant % 60;
            document.getElementById("minuteur").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(tempsRestant <= 0){
                clearInterval(intervalMinuteur);
                document.getElementById("bouton_de_finition").disabled = false;
                document.getElementById("bouton_de_finition").innerText = "اضغط لاستلام 20 درهم";
            }
        }, 1000);
    }
    
    function finirTache(){
        clearInterval(intervalMinuteur);
        alert("مبروك! تم اضافة 20 درهم الى رصيدك");
        document.getElementById("equilibre").innerText = "20";
    }
    
    function copyLink(){
        const link = document.getElementById("refLink");
        link.select();
        document.execCommand("copy");
        alert("تم نسخ الرابط!");
    }

    // تشغيل العداد مباشرة
    commencerMinuteur();
    document.getElementById("refLink").value = "https://benjyt803-ui.github.io/online-work-morocco/Register.html?ref=TEST123";
</script>
</body>
</html>
