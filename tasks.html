<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المهام اليومية</title>
<style>
body { background:#fff0f5; font-family:Arial; text-align:center; padding:10px; }
h2 { color:#ff69b4; }
.product { background:white; border:1px solid #ff69b4; margin:10px; padding:10px; border-radius:10px; }
button { background:#ff69b4; color:white; border:none; padding:10px 20px; border-radius:5px; font-size:16px; }
button:disabled { background:gray; }
#compteur { font-size:20px; font-weight:bold; color:green; }
</style>
</head>
<body>

<h2>⚡ المهام اليومية</h2>
<p>لقد اكملت: <span id="compteur">0</span> / 10 مهام</p>
<p>ربحتي اليوم: <span id="arba7">0</span> درهم</p>

<div class="product">
  <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=منتوج+1" width="150">
  <p>فستان صيفي</p>
  <button onclick="gagner(this)">اضغطي +0.5 درهم</button>
</div>

<div class="product">
  <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=منتوج+2" width="150">
  <p>حقيبة يد</p>
  <button onclick="gagner(this)">اضغطي +0.5 درهم</button>
</div>

<div class="product">
  <img src="https://via.placeholder.com/150/ff69b4/ffffff?text=منتوج+3" width="150">
  <p>حذاء رياضي</p>
  <button onclick="gagner(this)">اضغطي +0.5 درهم</button>
</div>

<script>
let compteur = 0;
let arba7 = 0;
let max = 10; // 10 ضغطات فالنهار

function gagner(btn) {
  if(compteur >= max){
    alert('كمليتي المهام ديال اليوم 🎉 ارجعي غدا');
    return;
  }
  if(btn.disabled) return;
  
  compteur++;
  arba7 = arba7 + 0.5;
  
  document.getElementById('compteur').innerText = compteur;
  document.getElementById('arba7').innerText = arba7;
  btn.disabled = true;
  btn.innerText = 'تم ✓';
  
  // هنا من بعد غادي نزيدو كود باش نحفظو الرصيد فـ Firebase
  alert('ربحتي +0.5 درهم 🎉');
  
  if(compteur == max){
    alert('برافو! كمليتي 10 مهام. ربحتي 5 دراهم اليوم');
  }
}
</script>

</body>
</html>
