
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المهام اليومية</title>
<style>
body { background:#fff0f5; font-family:Arial; text-align:center; padding:10px; }
h2 { color:#ff69b4; }
.product { background:white; border:1px solid #ff69b4; margin:10px; padding:10px; border-radius:10px; }
button { background:#ff69b4; color:white; border:none; padding:10px 20px; border-radius:5px; font-size:16px; }
button:disabled { background:gray; }
</style>
</head>
<body>

<h2>⚡ المهام اليومية</h2>
<p>لقد اكملت: <span id="compteur">0</span> / 10 مهام</p>
<p>ربحتي اليوم: <span id="arba7">0</span> درهم</p>

<div class="product"><img src="https://via.placeholder.com/150/ff69b4/ffffff?text=1" width="150"><p>فستان</p><button onclick="gagner(this)">+0.5 درهم</button></div>
<div class="product"><img src="https://via.placeholder.com/150/ff69b4/ffffff?text=2" width="150"><p>حقيبة</p><button onclick="gagner(this)">+0.5 درهم</button></div>
<div class="product"><img src="https://via.placeholder.com/150/ff69b4/ffffff?text=3" width="150"><p>حذاء</p><button onclick="gagner(this)">+0.5 درهم</button></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6fo63qKcstFX8xFhGUD5wIRp...",
    databaseURL: "https://shein-maroc-app-default-rtdb.firebaseio.com",
    projectId: "shein-maroc-app",
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase();
  const userPhone = "0651234567";

  let compteur = 0;
  let solde = 0;

  window.onload = async function() {
    const snapshot = await get(child(ref(db), 'users/' + userPhone));
    if (snapshot.exists()) {
      solde = snapshot.val().solde || 0;
    }
    document.getElementById('arba7').innerText = solde.toFixed(2);
  }

  window.gagner = function(btn) {
    if(btn.disabled) return;
    compteur++;
    solde = solde + 0.5;
    document.getElementById('compteur').innerText = compteur;
    document.getElementById('arba7').innerText = solde.toFixed(2);
    btn.disabled = true;
    set(ref(db, 'users/' + userPhone), { solde: solde });
    alert('ربحتي +0.5 درهم 🎉');
  }
</script>
</body>
</html>
