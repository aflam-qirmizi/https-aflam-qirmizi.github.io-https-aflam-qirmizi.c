<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل حساب</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.container{
max-width:400px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0a7cff;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0a7cff;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h2>إنشاء حساب</h2>

<input type="text" placeholder="الاسم الكامل">

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<button>تسجيل</button>

<a href="index.html">العودة للرئيسية</a>

</div>

</body>
</html>
