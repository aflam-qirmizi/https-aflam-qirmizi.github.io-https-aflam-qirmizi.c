<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>
<style>
  body{font-family:'Cairo',sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
  .boite{background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);width:90%;max-width:400px}
  h2{text-align:center;color:#333;margin-bottom:20px}
  input{width:100%;padding:14px;margin:10px 0;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;box-sizing:border-box}
  button{width:100%;padding:14px;background:#00aaff;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
  button:hover{opacity:0.9}
</style>
</head>
<body>
<div class="boite">
  <h2>إنشاء حساب جديد</h2>
  <input type="text" id="nom" placeholder="الاسم الكامل">
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="motdepasse" placeholder="كلمة السر">
  <button onclick="registre()">تسجيل</button>
  
  <hr style="margin:20px 0;border:none;border-top:1px solid #ddd;">
  <p style="text-align:center;font-size:13px;color:#666;">أو</p>
  
  <button onclick="loginWithGoogle()" style="background:white;border:2px solid #ddd;color:#333;">
    <img src="https://www.google.com/favicon.ico" style="width:18px;vertical-align:middle;margin-left:8px;">
    المتابعة مع Google
  </button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6fo63qKcstFX8xFhGUD5wIRprabL0qso",
    authDomain: "shein-maroc-app.firebaseapp.com",
    projectId: "shein-maroc-app",
    storageBucket: "shein-maroc-app.firebasestorage.app",
    messagingSenderId: "105488018363",
    appId: "1:105488018363:web:04595ef4d6f2dcff2ab29e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window.registre = async function(){
    const nom = document.getElementById('nom').value;
    const email = document.getElementById('email').value;
    const motdepasse = document.getElementById('motdepasse').value;
    try{
      const userCredential = await createUserWithEmailAndPassword(auth, email, motdepasse);
      await setDoc(doc(db, "users", userCredential.user.uid), {
        name: nom, email: email, balance: 0, createdAt: new Date()
      });
      alert("تم التسجيل بنجاح");
      window.location.href = "Tasks.html";
    } catch(error){ alert(error.message); }
  }

  window.loginWithGoogle = async function(){
    try{
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      await setDoc(doc(db, "users", user.uid), {
        name: user.displayName, email: user.email, balance: 0, createdAt: new Date()
      }, {merge: true});
      window.location.href = "Tasks.html";
    } catch(error){ alert(error.message); }
  }
</script>
</body>
</html>
