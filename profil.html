
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>البروفيل</title>
<style>
body { background:#f5f5f5; font-family:Arial; margin:0; }
.header { background:#00bfff; color:white; padding:15px; text-align:right; }
.balance { background:white; margin:10px; padding:20px; border-radius:10px; text-align:center; }
.balance h2 { margin:5px; }
.balance p { color:gray; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <div>0651234567</div>
  <div style="font-size:12px;">👤 VIP1</div>
</div>

<div class="balance">
  <h2 id="solde">MAD 0.00</h2>
  <p>رصيدي</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6fo63qKcstFX8xFhGUD5wIRp...",
    databaseURL: "https://shein-maroc-app-default-rtdb.firebaseio.com",
    projectId: "shein-maroc-app",
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase();
  const userPhone = "0651234567";

  window.onload = async function() {
    const snapshot = await get(child(ref(db), 'users/' + userPhone));
    if (snapshot.exists()) {
      let solde = snapshot.val().solde || 0;
      document.getElementById('solde').innerText = 'MAD ' + solde.toFixed(2);
    }
  }
</script>
</body>
</html>
