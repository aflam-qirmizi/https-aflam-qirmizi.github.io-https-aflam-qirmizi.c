<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الحساب</title>
<style>
body{background:#f5f5f5;font-family:Arial;padding:20px;}
.card{background:white;padding:20px;border-radius:10px;margin:10px 0;}
input,select{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd;border-radius:8px;}
button{background:#00bfff;color:white;border:none;padding:12px;width:100%;border-radius:8px;font-size:16px;}
</style>
</head>
<body>

<div class="card">
  <h2>رصيدك: <span id="balance">0</span> درهم</h2>
</div>

<div class="card">
  <h3>طلب سحب</h3>
  <input type="number" id="montant" placeholder="المبلغ للسحب">
  <select id="methode">
    <option>Orange Money</option>
    <option>CIH Bank</option>
  </select>
  <input type="text" id="numero" placeholder="رقم الهاتف او الحساب البنكي">
  <button onclick="demanderRetrait()">طلب السحب</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6fo63qKcstFX8xFhGUD5wIRprabL0qso",
    authDomain: "shein-maroc-app.firebaseapp.com",
    projectId: "shein-maroc-app",
    storageBucket: "shein-maroc-app.firebasestorage.app",
    messagingSenderId: "105488018363",
    appId: "1:105488018363:web:04595ef4d6f2dcff2ab29e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if(user){
      const docSnap = await getDoc(doc(db, "users", user.uid));
      document.getElementById('balance').innerText = docSnap.data().balance;
    }
  });

  window.demanderRetrait = async function(){
    const user = auth.currentUser;
    const montant = document.getElementById('montant').value;
    const methode = document.getElementById('methode').value;
    const numero = document.getElementById('numero').value;
    
    await addDoc(collection(db, "retraits"), {
      uid: user.uid,
      montant: montant,
      methode: methode,
      numero: numero,
      status: "en attente",
      date: new Date()
    });
    alert("تم إرسال طلب السحب بنجاح");
  }
</script>
</body>
</html>
